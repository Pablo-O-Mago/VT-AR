<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Todos os Marcadores AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    p  { font-size: 12px; color: #666; margin-bottom: 16px; }
    .btn-print { background: #111; color: #fff; border: none; border-radius: 8px; padding: 10px 28px; font-size: 14px; cursor: pointer; margin-bottom: 20px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      background: #fff;
      padding: 12px;
      border-radius: 12px;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .item img {
      width: 100%;
      aspect-ratio: 1;
      image-rendering: pixelated;
      display: block;
    }
    .item span {
      font-size: 9px;
      color: #555;
      text-align: center;
    }

    @media print {
      body { background: #fff; padding: 8mm; }
      h1, p, .btn-print { display: none; }
      .grid {
        padding: 0;
        gap: 4px;
        grid-template-columns: repeat(8, 1fr);
      }
      .item span { font-size: 7pt; }
    }
  </style>
</head>
<body>
  <h1>Marcadores AR — 3x3 (64 IDs)</h1>
  <p>Imprima em A4. Recorte com margem branca ao redor de cada marcador.</p>
  <button class="btn-print" onclick="window.print()">Imprimir folha completa</button>

  <div class="grid" id="grid"></div>

  <script>
    var CDN = 'https://cdn.jsdelivr.net/gh/nicolocarpignoli/artoolkit-barcode-markers-collection@master/3x3/';
    var grid = document.getElementById('grid');
    for (var i = 0; i < 64; i++) {
      var div = document.createElement('div');
      div.className = 'item';
      var img = document.createElement('img');
      img.src = CDN + i + '.png';
      var span = document.createElement('span');
      span.textContent = '#' + i;
      div.appendChild(img);
      div.appendChild(span);
      grid.appendChild(div);
    }
  </script>
</body>
</html>
