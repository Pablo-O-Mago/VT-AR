<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Vitrine AR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/84/three.min.js"></script>
  <script src="https://jeromeetienne.github.io/AR.js/three.js/build/ar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: #000; }

    #ar-canvas { position: fixed; inset: 0; width: 100% !important; height: 100% !important; }

    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      padding: 8px 12px; display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.6);
    }
    #topbar span {
      color: #fff; font-size: 12px; font-weight: 700;
      background: #1976d2; padding: 4px 10px; border-radius: 20px;
    }
    #topbar button {
      background: rgba(255,255,255,0.15); color: #fff; border: none;
      border-radius: 20px; padding: 6px 12px; font-size: 12px; cursor: pointer;
    }

    #hint {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: #fff; font-size: 13px;
      padding: 8px 20px; border-radius: 20px; z-index: 999;
      pointer-events: none; white-space: nowrap;
    }

    .ar-label {
      position: fixed;
      z-index: 100;
      pointer-events: auto;
      transform: translate(-50%, -100%);
      background: rgba(10,10,40,0.92);
      border: 2px solid #4fc3f7;
      border-radius: 12px;
      padding: 8px 14px;
      color: #fff;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      display: none;
    }
    .ar-label .lbl-nome { font-size: 15px; font-weight: 700; }
    .ar-label .lbl-ref  { font-size: 12px; color: #4fc3f7; margin-top: 2px; }
    .ar-label .lbl-est  { font-size: 11px; color: #aaa; margin-top: 1px; }
    .ar-label::after {
      content: '';
      position: absolute;
      bottom: -10px; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #4fc3f7;
    }

    #loading {
      position: fixed; inset: 0; background: #111;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 9999; color: #fff;
    }
    #loading h2 { font-size: 18px; font-weight: 700; }
    #load-bar-wrap { width: 220px; background: #333; border-radius: 99px; height: 6px; }
    #load-bar { background: #4fc3f7; height: 100%; width: 0%; border-radius: 99px; transition: width 0.3s; }
    #load-txt { font-size: 13px; color: #aaa; text-align: center; padding: 0 32px; }

    #no-produtos {
      display: none; position: fixed; inset: 0; background: #111;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 9999; color: #fff; text-align: center; padding: 32px;
    }
    #no-produtos h2 { font-size: 20px; }
    #no-produtos p  { font-size: 14px; color: #aaa; }
    #no-produtos button {
      background: #4fc3f7; color: #000; border: none; border-radius: 12px;
      padding: 14px 32px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px;
    }

    #info-modal {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.6); align-items: flex-end; justify-content: center;
    }
    #info-modal.open { display: flex; }
    #info-card {
      background: #fff; border-radius: 20px 20px 0 0;
      padding: 24px 20px 36px; width: 100%; max-width: 480px;
    }
    #info-card h2 { margin: 0 0 4px; font-size: 20px; font-weight: 700; }
    .sub { color: #888; font-size: 13px; margin-bottom: 16px; display: block; }
    .info-row {
      display: flex; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px;
    }
    .info-row:last-of-type { border-bottom: none; }
    .info-label { color: #888; }
    .info-val { font-weight: 500; }
    .btn-row { display: flex; gap: 8px; margin-top: 14px; }
    .btn-row button {
      flex: 1; padding: 13px; border: none; border-radius: 12px;
      font-size: 14px; cursor: pointer; font-weight: 600;
    }
    #btn-fechar   { background: #111; color: #fff; }
    #btn-cadastro { background: #f0f0f0; color: #333; font-weight: 400; }
  </style>
</head>
<body>

<canvas id="ar-canvas"></canvas>

<div id="loading">
  <h2>Vitrine AR</h2>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
  <p id="load-txt">Carregando...</p>
</div>

<div id="no-produtos">
  <h2>Nenhum produto cadastrado</h2>
  <p>Cadastre produtos para gerar seus marcadores AR.</p>
  <button onclick="location.href='cadastro.html'">Ir para o Cadastro</button>
</div>

<div id="topbar">
  <span>VITRINE AR</span>
  <button onclick="window.open('cadastro.html')">Cadastro</button>
</div>
<div id="hint">Aponte a câmera para um marcador</div>

<div id="info-modal">
  <div id="info-card">
    <h2 id="i-nome"></h2>
    <span class="sub" id="i-ref"></span>
    <div class="info-row"><span class="info-label">Estoque</span><span class="info-val" id="i-estoque"></span></div>
    <div class="info-row"><span class="info-label">Localização</span><span class="info-val" id="i-loc"></span></div>
    <div class="btn-row">
      <button id="btn-cadastro" onclick="window.open('cadastro.html')">Editar</button>
      <button id="btn-fechar"   onclick="fecharInfo()">Fechar</button>
    </div>
  </div>
</div>

<script>
function fecharInfo() {
  document.getElementById('info-modal').classList.remove('open');
}
function abrirInfo(p) {
  document.getElementById('i-nome').textContent    = p.nome;
  document.getElementById('i-ref').textContent     = p.ref || '';
  document.getElementById('i-estoque').textContent = p.estoque || '—';
  document.getElementById('i-loc').textContent     = p.loc || '—';
  document.getElementById('info-modal').classList.add('open');
}
function setLoad(pct, txt) {
  document.getElementById('load-bar').style.width = pct + '%';
  document.getElementById('load-txt').textContent = txt;
}

// ── IndexedDB ─────────────────────────────────────────────────────────────────
function abrirDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open('vt-ar', 2);
    req.onupgradeneeded = function(e) {
      e.target.result.createObjectStore('produtos', { keyPath: 'id' });
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror   = function(e) { reject(e.target.error); };
  });
}
function dbGetAll(db) {
  return new Promise(function(resolve, reject) {
    var req = db.transaction('produtos', 'readonly').objectStore('produtos').getAll();
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror   = function(e) { reject(e.target.error); };
  });
}

// ── AR principal ──────────────────────────────────────────────────────────────
abrirDB().then(dbGetAll).then(function(produtos) {
  var validos = produtos.filter(function(p) { return p.marcadorId >= 0; });

  if (!validos.length) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('no-produtos').style.display = 'flex';
    return;
  }

  setLoad(30, 'Iniciando AR...');

  var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setClearColor(new THREE.Color('black'), 0);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.domElement.style.position = 'fixed';
  renderer.domElement.style.inset = '0';
  renderer.domElement.style.zIndex = '1';
  document.body.appendChild(renderer.domElement);
  document.getElementById('ar-canvas').style.display = 'none';

  var scene  = new THREE.Scene();
  var camera = new THREE.Camera();
  scene.add(camera);

  // AR Toolkit
  var arSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
  arSource.init(function() {
    // Garante que o vídeo fique atrás do canvas 3D
    var vid = document.querySelector('video');
    if (vid) {
      vid.style.position = 'fixed';
      vid.style.inset = '0';
      vid.style.zIndex = '0';
      vid.style.width = '100%';
      vid.style.height = '100%';
      vid.style.objectFit = 'cover';
    }
    onResize();
    setLoad(70, 'Câmera pronta...');
  });

  var arContext = new THREEx.ArToolkitContext({
    cameraParametersUrl: 'https://jeromeetienne.github.io/AR.js/data/data/camera_para.dat',
    detectionMode: 'mono_and_matrix',
    matrixCodeType: '3x3',
  });
  arContext.init(function() {
    camera.projectionMatrix.copy(arContext.getProjectionMatrix());
    setLoad(100, 'Pronto!');
    setTimeout(function() { document.getElementById('loading').style.display = 'none'; }, 400);
  });

  window.addEventListener('resize', onResize);
  function onResize() {
    arSource.onResizeElement();
    arSource.copyElementSizeTo(renderer.domElement);
    if (arContext.arController) arSource.copyElementSizeTo(arContext.arController.canvas);
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  // Cria um marker + label HTML por produto
  var markers = [];

  validos.forEach(function(p) {
    var markerRoot = new THREE.Group();
    scene.add(markerRoot);

    new THREEx.ArMarkerControls(arContext, markerRoot, {
      type: 'barcode',
      barcodeValue: p.marcadorId,
    });

    // Label HTML
    var el = document.createElement('div');
    el.className = 'ar-label';
    el.innerHTML =
      '<div class="lbl-nome">' + esc(p.nome) + '</div>' +
      (p.ref     ? '<div class="lbl-ref">'  + esc(p.ref)     + '</div>' : '') +
      (p.estoque ? '<div class="lbl-est">'  + esc(p.estoque) + '</div>' : '');
    el.addEventListener('click', function() { abrirInfo(p); });
    document.body.appendChild(el);

    // Ponto 3D acima do centro do marker (em coordenadas locais do markerRoot)
    var anchor = new THREE.Vector3(0, 0, 0);

    markers.push({ markerRoot: markerRoot, el: el, anchor: anchor });
  });

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  var _worldPos = new THREE.Vector3();
  var _proj     = new THREE.Vector3();

  // Loop
  requestAnimationFrame(function loop() {
    requestAnimationFrame(loop);
    if (!arSource.ready) return;
    arContext.update(arSource.domElement);
    renderer.render(scene, camera);

    var W = window.innerWidth;
    var H = window.innerHeight;

    markers.forEach(function(m) {
      if (!m.markerRoot.visible) {
        m.el.style.display = 'none';
        return;
      }

      // Pega posição world do centro do marker
      m.markerRoot.updateMatrixWorld(true);
      _worldPos.setFromMatrixPosition(m.markerRoot.matrixWorld);

      // Projeta para NDC
      _proj.copy(_worldPos);
      _proj.project(camera);

      // Converte NDC → pixels
      var sx = ( _proj.x * 0.5 + 0.5) * W;
      var sy = (-_proj.y * 0.5 + 0.5) * H;

      // Coloca o label acima do ponto projetado
      m.el.style.display = 'block';
      m.el.style.left = sx + 'px';
      m.el.style.top  = (sy - 20) + 'px';  // 20px acima do centro projetado
    });
  });

}).catch(function(err) {
  document.getElementById('load-txt').textContent = 'Erro: ' + err.message;
});
</script>
</body>
</html>
