<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Debug</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/84/three.min.js"></script>
  <script src="https://jeromeetienne.github.io/AR.js/three.js/build/ar.js"></script>
  <style>
    * { margin:0; padding:0; }
    body { overflow:hidden; background:#000; font-family:monospace; }
    #log { position:fixed; bottom:0; left:0; right:0; z-index:999; background:rgba(0,0,0,0.85); color:#0f0; font-size:12px; padding:8px; max-height:40vh; overflow-y:auto; }
    #status { position:fixed; top:0; left:0; right:0; z-index:999; background:rgba(0,0,0,0.8); color:#fff; font-size:14px; padding:10px; text-align:center; }
    #banner { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#00c853; color:#fff; font-size:28px; font-weight:bold; padding:24px 48px; border-radius:20px; z-index:9999; text-align:center; }

    /* Botões para trocar marcador */
    #controles { position:fixed; top:50px; left:0; right:0; z-index:999; display:flex; justify-content:center; gap:8px; flex-wrap:wrap; padding:8px; }
    #controles button { background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.4); border-radius:8px; padding:6px 12px; font-size:12px; cursor:pointer; }
    #controles button.ativo { background:#4fc3f7; color:#000; border-color:#4fc3f7; }
    #modo-atual { position:fixed; top:100px; left:0; right:0; z-index:999; text-align:center; color:#fff; font-size:13px; }
  </style>
</head>
<body>
<div id="status">Carregando...</div>
<div id="banner"></div>
<div id="controles">
  <button onclick="trocarModo('hiro')"    id="btn-hiro">Hiro</button>
  <button onclick="trocarModo('3x3',0)"  id="btn-3x3-0">3x3 #0</button>
  <button onclick="trocarModo('3x3',1)"  id="btn-3x3-1">3x3 #1</button>
  <button onclick="trocarModo('3x3',2)"  id="btn-3x3-2">3x3 #2</button>
  <button onclick="trocarModo('3x3',3)"  id="btn-3x3-3">3x3 #3</button>
</div>
<div id="modo-atual">Modo: HIRO</div>
<div id="log"></div>

<script>
function log(msg) {
  var d = document.createElement('div');
  d.textContent = new Date().toLocaleTimeString()+' '+msg;
  document.getElementById('log').appendChild(d);
  document.getElementById('log').scrollTop = 9999;
}
function setStatus(t) { document.getElementById('status').textContent = t; log(t); }

var renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setClearColor(new THREE.Color('black'), 0);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.domElement.style.cssText = 'position:fixed;inset:0;z-index:1;';
document.body.appendChild(renderer.domElement);

var scene = new THREE.Scene();
var camera = new THREE.Camera();
scene.add(camera);

var arSource = new THREEx.ArToolkitSource({ sourceType:'webcam' });
arSource.init(function() {
  var vid = document.querySelector('video');
  if (vid) {
    vid.style.cssText = 'position:fixed;inset:0;z-index:0;width:100%;height:100%;object-fit:cover;';
    log('video OK: '+vid.videoWidth+'x'+vid.videoHeight);
  }
  onResize();
  setStatus('Câmera OK');
});

window.addEventListener('resize', onResize);
function onResize() {
  arSource.onResizeElement();
  arSource.copyElementSizeTo(renderer.domElement);
  if (arContext.arController) arSource.copyElementSizeTo(arContext.arController.canvas);
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// Começa com mono (Hiro), pode trocar
var arContext = new THREEx.ArToolkitContext({
  cameraParametersUrl: 'https://jeromeetienne.github.io/AR.js/data/data/camera_para.dat',
  detectionMode: 'mono',
});
arContext.init(function() {
  camera.projectionMatrix.copy(arContext.getProjectionMatrix());
  log('arContext OK — detectionMode: mono');
  setStatus('Pronto — aponte para o HIRO');
});

// Marker atual
var markerRoot = new THREE.Group();
scene.add(markerRoot);

var markerControls = new THREEx.ArMarkerControls(arContext, markerRoot, {
  type: 'pattern',
  patternUrl: 'https://jeromeetienne.github.io/AR.js/data/data/patt.hiro',
});

var cubo = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshNormalMaterial());
cubo.position.y = 0.5;
markerRoot.add(cubo);

var modoAtual = 'hiro';
var idAtual = null;

function trocarModo(tipo, id) {
  // Só loga o modo — não recria o contexto (isso exige reload)
  modoAtual = tipo;
  idAtual = id;
  document.getElementById('modo-atual').textContent =
    'Modo: ' + (tipo === 'hiro' ? 'HIRO' : '3x3 #'+id) +
    ' — recarregue a página com o botão abaixo para trocar';

  document.querySelectorAll('#controles button').forEach(function(b){ b.classList.remove('ativo'); });
  var btnId = tipo === 'hiro' ? 'btn-hiro' : 'btn-3x3-'+id;
  var btn = document.getElementById(btnId);
  if (btn) btn.classList.add('ativo');

  log('ATENÇÃO: trocar modo requer reload. Modo salvo: '+tipo+(id!=null?' #'+id:''));
}

document.getElementById('btn-hiro').classList.add('ativo');

var lastLog = 0, found = false;
requestAnimationFrame(function loop(ts) {
  requestAnimationFrame(loop);
  if (!arSource.ready) return;
  arContext.update(arSource.domElement);

  if (ts - lastLog > 1500) {
    lastLog = ts;
    var vis = markerRoot.visible;
    log('visible='+vis+' modo='+modoAtual+(idAtual!=null?' #'+idAtual:''));
    if (vis && !found) {
      found = true;
      var b = document.getElementById('banner');
      b.textContent = 'DETECTADO! (' + modoAtual + (idAtual!=null?' #'+idAtual:'') + ')';
      b.style.display = 'block';
      setTimeout(function(){ b.style.display='none'; found=false; }, 3000);
    }
  }
  renderer.render(scene, camera);
});
</script>
</body>
</html>
